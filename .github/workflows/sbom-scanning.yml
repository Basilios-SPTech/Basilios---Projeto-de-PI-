name: SBOM Scan with HTML Report

on:
  push:
    branches: ["main"]

jobs:
  sbom-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft . -o cyclonedx-json > sbom.json

      - name: Install Bomber
        run: |
          curl -L https://github.com/devops-kung-fu/bomber/releases/latest/download/bomber_Linux_x86_64.tar.gz \
          | tar -xz
          sudo mv bomber /usr/local/bin/

      - name: Generate HTML report
        run: |
          bomber scan sbom.json -o html > bomber-report.html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: bomber-html-report
          path: bomber-report.html
