name: SCA - Bomber (SBOM Vulnerability Scan)

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  bomber-scan:
    name: Generate SBOM + Bomber Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------
      # 1. Instalar Syft (gerador de SBOM)
      # ----------------------------------------
      # Syft escaneia o projeto e gera um SBOM no formato CycloneDX JSON,
      # que é o formato preferido pelo bomber.
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.17.9

      - name: Generate SBOM with Syft
        run: |
          syft packages . \
            --output cyclonedx-json=sbom.cyclonedx.json \
            --output spdx-json=sbom.spdx.json
          echo "SBOM gerado com sucesso."

      # ----------------------------------------
      # 2. Instalar bomber v0.5.1
      # ----------------------------------------
      # Não há GitHub Action oficial do bomber, então instalamos
      # o binário diretamente do release mais recente (v0.5.1).
      - name: Install bomber
        run: |
          BOMBER_VERSION="0.5.1"
          curl -sSfL \
            "https://github.com/devops-kung-fu/bomber/releases/download/v${BOMBER_VERSION}/bomber_${BOMBER_VERSION}_linux_amd64.tar.gz" \
            -o bomber.tar.gz
          tar -xzf bomber.tar.gz bomber
          chmod +x bomber
          sudo mv bomber /usr/local/bin/bomber
          bomber version

      # ----------------------------------------
      # 3. Scan com provider OSV (sem credenciais)
      # ----------------------------------------
      # OSV é o provider padrão e gratuito do bomber.
      # Usamos --exitcode para que o step falhe se vulnerabilidades
      # críticas forem encontradas (o exit code reflete a severidade).
      - name: Run Bomber with OSV (default, no credentials needed)
        id: bomber_osv
        run: |
          bomber scan \
            --provider osv \
            --output json \
            --exitcode \
            sbom.cyclonedx.json > bomber-osv-results.json 2>&1 || true

          # Captura o exit code real para avaliar severidade
          bomber scan \
            --provider osv \
            --exitcode \
            sbom.cyclonedx.json > /dev/null 2>&1
          echo "BOMBER_EXIT_CODE=$?" >> $GITHUB_ENV
        continue-on-error: true

      # ----------------------------------------
      # 4. Scan com GitHub Advisory Database (opcional, requer token)
      # ----------------------------------------
      # Para usar o GitHub como provider, basta um GITHUB_TOKEN padrão.
      # Descomente este bloco se quiser cobertura adicional.
      #
      # - name: Run Bomber with GitHub Advisory Database
      #   run: |
      #     bomber scan \
      #       --provider github \
      #       --token ${{ secrets.GITHUB_TOKEN }} \
      #       --output json \
      #       sbom.cyclonedx.json > bomber-github-results.json 2>&1 || true
      #   continue-on-error: true

      # ----------------------------------------
      # 5. Gerar relatório HTML para artefato
      # ----------------------------------------
      - name: Generate HTML report
        run: |
          bomber scan \
            --provider osv \
            --output html \
            sbom.cyclonedx.json > bomber-report.html 2>&1 || true
        continue-on-error: true

      # ----------------------------------------
      # 6. Upload dos artefatos (SBOM + relatórios)
      # ----------------------------------------
      - name: Upload SBOM and Bomber reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-and-bomber-reports
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
            bomber-osv-results.json
            bomber-report.html
          retention-days: 30

      # ----------------------------------------
      # 7. Comentário de resumo no PR
      # ----------------------------------------
      - name: Comment Bomber summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          BOMBER_EXIT_CODE: ${{ env.BOMBER_EXIT_CODE }}
        with:
          script: |
            const fs = require('fs');

            // Exit codes do bomber refletem a severidade máxima encontrada:
            // 0 = nenhuma vulnerabilidade
            // 1 = LOW   2 = MEDIUM   3 = HIGH   4 = CRITICAL
            const exitCode = parseInt(process.env.BOMBER_EXIT_CODE || '0', 10);

            const severityMap = {
              0: { label: '✅ Nenhuma vulnerabilidade', color: 'verde' },
              1: { label: '🟡 LOW',      color: 'amarelo' },
              2: { label: '🟠 MEDIUM',   color: 'laranja' },
              3: { label: '🔴 HIGH',     color: 'vermelho' },
              4: { label: '🚨 CRITICAL', color: 'crítico' },
            };

            const severity = severityMap[exitCode] ?? { label: '❓ Desconhecido', color: '' };

            // Tenta extrair totais do JSON
            let vulnCount  = 'N/A';
            let pkgScanned = 'N/A';

            if (fs.existsSync('bomber-osv-results.json')) {
              try {
                const raw = fs.readFileSync('bomber-osv-results.json', 'utf8');
                // bomber JSON inclui metadados de pacotes e vulnerabilidades
                const lines = raw.split('\n').filter(Boolean);
                const data  = JSON.parse(lines[lines.length - 1] || '{}');
                vulnCount  = data?.vulnerabilities?.length ?? 'N/A';
                pkgScanned = data?.packages?.length ?? 'N/A';
              } catch (_) {}
            }

            const emoji     = exitCode >= 4 ? '🚨' : exitCode >= 3 ? '🔴' : exitCode >= 1 ? '⚠️' : '✅';
            const blocker   = exitCode >= 3
              ? '\n> 🚨 **ATENÇÃO:** Vulnerabilidades HIGH/CRITICAL detectadas nas dependências! Revise antes de fazer merge.'
              : '';

            const body = [
              `### ${emoji} SCA — Bomber SBOM Scan`,
              '',
              '| Campo | Valor |',
              '|-------|-------|',
              `| 📦 **Provider** | OSV (Google Open Source Vulnerabilities) |`,
              `| 🔎 **Pacotes escaneados** | ${pkgScanned} |`,
              `| 🐛 **Vulnerabilidades encontradas** | ${vulnCount} |`,
              `| 🎯 **Severidade máxima** | ${severity.label} |`,
              `| 📄 **Relatório HTML** | Disponível em Actions → Artifacts → \`sbom-and-bomber-reports\` |`,
              blocker,
              '',
              '> 💡 O SBOM completo (CycloneDX + SPDX) foi salvo como artefato do workflow.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # ----------------------------------------
      # 8. Falhar o job se severidade >= HIGH
      # ----------------------------------------
      # Remove este step se quiser que o scan seja apenas informativo.
      - name: Fail on HIGH or CRITICAL vulnerabilities
        if: env.BOMBER_EXIT_CODE >= 3
        run: |
          echo "::error::Vulnerabilidades de severidade HIGH ou CRITICAL encontradas pelo Bomber."
          echo "Verifique o relatório em Actions → Artifacts → sbom-and-bomber-reports"
          exit 1
