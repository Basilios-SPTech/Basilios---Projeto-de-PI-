name: Code Quality & Secrets Scan

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: # escaneia PRs DESTINADOS à main
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  security:
    name: Linting + Secrets Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para TruffleHog escanear todo o histórico

      # ----------------
      # Secrets Detection - TruffleHog
      # ----------------
      - name: Run TruffleHog
        id: trufflehog
        uses: trufflesecurity/trufflehog@v3.88.2 # versão fixada
        with:
          extra_args: --only-verified --sarif # gera SARIF para Code Scanning
        continue-on-error: true

      - name: Upload TruffleHog SARIF
        uses: github/codeql-action/upload-sarif@v3 # ✅ resultados visíveis em Security
        if: always()
        with:
          sarif_file: trufflehog.sarif
          category: trufflehog

      # ----------------
      # Secrets Detection - Detect-Secrets
      # ----------------
      - name: Run Detect-Secrets
        run: |
          pip install detect-secrets --quiet

          # ✅ Cria baseline se não existir (evita falha em repos novos)
          if [ ! -f .secrets.baseline ]; then
            detect-secrets scan > .secrets.baseline
          fi

          # ✅ scan + diff contra baseline — saída legível em CI
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline --report --json > secrets-report.json 2>/dev/null || true

          # Conta secrets novos não auditados
          NEW_SECRETS=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('secrets-report.json'))
              count = sum(1 for r in data.get('results', {}).values() for s in r if not s.get('is_verified', False))
              print(count)
          except:
              print(0)
          ")
          echo "DETECT_SECRETS_COUNT=$NEW_SECRETS" >> $GITHUB_ENV
        continue-on-error: true

      # ----------------
      # Linting - ESLint (JavaScript/TypeScript)
      # ----------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "Nenhum package.json encontrado, pulando instalação."
          fi
        continue-on-error: true

      - name: Run ESLint
        run: |
          npx eslint . \
            --format json \
            --output-file eslint-report.json \
            --max-warnings 0 || true
        continue-on-error: true

      # ----------------
      # Security Linting - ESLint Security Plugin
      # ----------------
      - name: Run ESLint Security Rules
        run: |
          npm install --save-dev eslint-plugin-security --quiet

          # ✅ config inline — funciona sem eslint.config.js no repo
          npx eslint . \
            --no-eslintrc \
            --plugin security \
            --rule 'security/detect-eval-with-expression: error' \
            --rule 'security/detect-non-literal-fs-filename: warn' \
            --rule 'security/detect-non-literal-regexp: warn' \
            --rule 'security/detect-object-injection: warn' \
            --rule 'security/detect-possible-timing-attacks: warn' \
            --rule 'security/detect-pseudoRandomBytes: error' \
            --rule 'security/detect-unsafe-regex: error' \
            --format json \
            --output-file eslint-security.json || true
        continue-on-error: true

      # ----------------
      # PR Summary
      # ----------------
      - name: Comment Summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let lintErrors   = 0;
            let lintWarnings = 0;
            let securityIssues = 0;
            let detectSecretsCount = 0;

            // ✅ Parse TruffleHog SARIF
            let truffleHogCount = 0;
            if (fs.existsSync('trufflehog.sarif')) {
              try {
                const sarif = JSON.parse(fs.readFileSync('trufflehog.sarif'));
                truffleHogCount = sarif.runs?.[0]?.results?.length ?? 0;
              } catch (e) {
                console.log('Erro ao parsear TruffleHog SARIF:', e.message);
              }
            }

            // ✅ Parse Detect-Secrets via variável de ambiente
            detectSecretsCount = parseInt(process.env.DETECT_SECRETS_COUNT || '0', 10);

            // Parse ESLint
            if (fs.existsSync('eslint-report.json')) {
              try {
                const eslint = JSON.parse(fs.readFileSync('eslint-report.json'));
                eslint.forEach(file => {
                  lintErrors   += file.errorCount   || 0;
                  lintWarnings += file.warningCount  || 0;
                });
              } catch (e) {
                console.log('Erro ao parsear ESLint:', e.message);
              }
            }

            // Parse ESLint Security
            if (fs.existsSync('eslint-security.json')) {
              try {
                const security = JSON.parse(fs.readFileSync('eslint-security.json'));
                security.forEach(file => {
                  securityIssues += (file.errorCount || 0) + (file.warningCount || 0);
                });
              } catch (e) {
                console.log('Erro ao parsear ESLint Security:', e.message);
              }
            }

            const totalSecrets = truffleHogCount + detectSecretsCount;
            const emoji = totalSecrets > 0 ? '🚨' : lintErrors > 0 ? '⚠️' : '✅';

            const body = [
              `### ${emoji} Code Quality & Security Summary`,
              '',
              '| Categoria | Resultado |',
              '|-----------|-----------|',
              `| 🔐 **TruffleHog (secrets verificados)** | ${truffleHogCount > 0 ? \`🚨 \${truffleHogCount} encontrado(s)\` : '✅ Nenhum'} |`,
              `| 🔍 **Detect-Secrets (não auditados)** | ${detectSecretsCount > 0 ? \`⚠️ \${detectSecretsCount} pendente(s)\` : '✅ Nenhum'} |`,
              `| ❌ **Erros de Lint** | ${lintErrors > 0 ? \`⚠️ \${lintErrors}\` : '✅ 0'} |`,
              `| ⚠️ **Warnings de Lint** | ${lintWarnings} |`,
              `| 🛡️ **Problemas de Segurança (ESLint)** | ${securityIssues > 0 ? \`⚠️ \${securityIssues}\` : '✅ 0'} |`,
              '',
              totalSecrets > 0
                ? '> 🚨 **CRÍTICO:** Secrets detectados! Revogue credenciais imediatamente e verifique os logs do workflow.'
                : '',
              lintErrors > 0
                ? '> ⚠️ Corrija os erros de lint antes de fazer merge.'
                : '',
              '',
              '📎 Detalhes completos em: **Security → Code Scanning Alerts** (TruffleHog) e logs do workflow.',
            ].filter(line => line !== undefined).join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
