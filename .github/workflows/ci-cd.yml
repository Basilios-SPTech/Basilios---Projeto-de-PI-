name: 🌐 Deploy React — WebServer

on:
  push:
    branches:
      - main
      - feat/pipe-main
    # paths:
      # - 'basilios-auth-ui/**'   # ajuste para o caminho da sua pasta React

defaults:
  run:
    working-directory: basilios-auth-ui   # ajuste se necessário

jobs:
  # ============================================================
  # JOB 1: Build do React (roda em runner hospedado pelo GitHub)
  # ============================================================
  build:
    name: 🔨 Build Front
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: basilios-auth-ui/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        run: npm run build
        env:
          # Adicione suas variáveis de ambiente do React aqui
          # VITE_API_URL: ${{ secrets.VITE_API_URL }}
          CI: false   # evita que warnings virem erros no build

      - name: Upload do artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: basilios-auth-ui/dist
          retention-days: 1

  # ============================================================
  # JOB 2: Deploy no WebServer via self-hosted runner
  # ============================================================
  deploy:
    name: 🚀 Deploy no WebServer
    runs-on: self-hosted
    needs: build

    steps:
      - name: Download do artefato de build
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: /tmp/react-build

      - name: Limpar diretório anterior e copiar novo build
        run: |
          sudo rm -rf /var/www/html/*
          sudo cp -r /tmp/react-build/. /var/www/html/
          sudo chown -R www-data:www-data /var/www/html
          sudo chmod -R 755 /var/www/html

      - name: Recarregar Nginx
        run: sudo systemctl reload nginx

      - name: Limpar artefato temporário
        run: rm -rf /tmp/react-build

      - name: Verificação do deploy
        run: |
          echo "✅ Deploy do React concluído!"
          echo "URL: http://$(curl -s http://169.254.169.254/latest/meta-data/public-hostname)"